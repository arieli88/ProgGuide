<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced C# Programming — Quiz Hub</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #6366f1;
    --correct: #22c55e;
    --incorrect: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app {
    width: 100%;
    max-width: 680px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  /* ---------- Menu view ---------- */
  .topic-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .topic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, transform 0.1s;
    color: var(--text);
    font-family: inherit;
  }
  .topic-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .topic-card .topic-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .topic-card .topic-desc {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .topic-card .topic-meta {
    font-size: 0.78rem;
    color: var(--accent);
  }

  /* ---------- Quiz view ---------- */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .home-btn {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .home-btn:hover {
    background: rgba(255, 255, 255, 0.05);
  }
  .quiz-heading {
    font-size: 1.05rem;
    font-weight: 600;
  }

  .progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.25s ease;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  .question {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.55;
    white-space: pre-wrap;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .question code, .question .code-block {
    display: block;
    background: #0b1220;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 10px 0;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85rem;
    font-weight: 400;
    color: #93c5fd;
    white-space: pre-wrap;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 0.95rem;
  }
  .option:hover {
    border-color: var(--accent);
  }
  .option.selected {
    border-color: var(--accent);
    background: rgba(99, 102, 241, 0.12);
  }
  .option.correct {
    border-color: var(--correct);
    background: rgba(34, 197, 94, 0.12);
  }
  .option.incorrect {
    border-color: var(--incorrect);
    background: rgba(239, 68, 68, 0.12);
  }
  .option input {
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .option.locked {
    cursor: default;
  }
  .feedback {
    display: none;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .feedback.show {
    display: block;
  }
  .feedback.correct {
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid var(--correct);
  }
  .feedback.incorrect {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid var(--incorrect);
  }
  .feedback strong {
    display: block;
    margin-bottom: 6px;
  }
  .feedback .hint {
    color: var(--muted);
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  button.nav {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  button.nav:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.05);
  }
  button.nav:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .nav-group {
    display: flex;
    gap: 8px;
  }
  .score {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 16px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- ===== Menu screen ===== -->
  <div id="menuScreen">
    <h1>Advanced C# Programming</h1>
    <div class="subtitle">Choose a topic to start its quiz</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- ===== Quiz screen ===== -->
  <div id="quizScreen" class="hidden">
    <div class="top-bar">
      <button class="home-btn" id="homeBtn">&larr; Topics</button>
      <div class="quiz-heading" id="quizHeading"></div>
    </div>

    <div class="progress">
      <span id="progressLabel"></span>
      <span id="answeredLabel"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="card">
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>

      <div class="feedback" id="feedback">
        <strong id="feedbackTitle"></strong>
        <div class="hint" id="feedbackHint"></div>
      </div>

      <div class="actions">
        <div class="nav-group">
          <button class="nav" id="prevBtn">&larr; Back</button>
          <button class="nav" id="nextBtn">Next &rarr;</button>
        </div>
        <button class="nav primary" id="checkBtn">Check Answer</button>
      </div>
    </div>

    <div class="score" id="scoreLabel"></div>
  </div>

</div>

<script>
const quizzes = [{"key": "oo", "topic": "Object-Oriented Fundamentals", "description": "Classes, objects, constructors & encapsulation", "quizTitle": "C# OO Quiz", "questions": [{"question": "In the context of the blueprint metaphor, which of the following best describes a 'Class'?", "options": ["The physical building constructed from architectural drawings.", "The specific data values stored within a program's memory.", "The abstract description of attributes and methods that a set of objects share.", "A communication message sent between different parts of a program."], "correct": 2, "hint": "Consider which component serves as the design template rather than the final product."}, {"question": "When declaring and instantiating an object in one line, such as `MyClass myObj = new MyClass();`, what does the second `MyClass` represent?", "options": ["The data type of the variable being declared.", "A call to the class constructor to create the object.", "A reference to the namespace containing the class.", "A static method used for memory allocation."], "correct": 1, "hint": "Focus on the specific component that initializes the new instance of the class."}, {"question": "Consider the following code snippet:\n\n`public class BankAccount {` \n `  int balance;` \n `  public BankAccount(int initial) { balance = initial; }` \n `}`\n\nWhat is a defining characteristic of the constructor shown above?", "options": ["It must return an integer value representing the balance.", "It has the exact same name as the class.", "It can only be called once throughout the entire program.", "It is an instance method that returns the newly created object."], "correct": 1, "hint": "Recall the strict naming convention required for initialization methods in C#."}, {"question": "Why is the principle of encapsulation critical for maintaining large software systems?", "options": ["It allows client classes to modify private fields directly for better performance.", "It ensures that all methods within a class are public and accessible.", "It allows implementation details to change without breaking code that uses the class.", "It forces every object to have the same attribute values."], "correct": 2, "hint": "Think about how separating 'how a task is done' from 'what the task is' affects code updates."}, {"question": "Which statement accurately describes the scope of a variable declared inside a method?", "options": ["It is accessible to any method within the same class.", "It can be accessed by the Main() method if the class is instantiated.", "It is only visible and accessible within the method where it was declared.", "It shares the same scope as the class attributes."], "correct": 2, "hint": "Recall the concept of 'scope isolation' mentioned in the source material."}, {"question": "Given the code:\n\n`class Car {` \n `  private int _price;` \n `  public void SetPrice(int p) { _price = p; }` \n `}`\n\nWhat role does the `SetPrice` method play?", "options": ["An accessor that retrieves the current state of an object.", "A mutator that allows controlled modification of a private field.", "A static method that sets the price for all Car objects simultaneously.", "A constructor that initializes the Car object's price."], "correct": 1, "hint": "Consider the term used for methods that 'set' or change data."}, {"question": "In C#, what is a primary purpose of using namespaces like `Europe_vehicles` and `Asia_vehicles`?", "options": ["To increase the execution speed of the program.", "To allow multiple classes with the same name to exist in one program.", "To ensure all variables are automatically declared as static.", "To hide the implementation of the Main() method."], "correct": 1, "hint": "Think about how a program handles two different classes both named 'Car'."}, {"question": "A method is defined as `bool Withdraw(int amount)`. What does the `bool` keyword signify in this context?", "options": ["The type of data required as an input parameter.", "The method will perform an action but return no data.", "The method must return a true or false value to the caller.", "The method can only be accessed by Boolean-type objects."], "correct": 2, "hint": "Consider the 'Definition Phase' of a method and what the leading keyword represents."}, {"question": "When calling a static method like `Math.Sqrt(25)`, which of the following is true?", "options": ["An object of the Math class must be created using 'new' first.", "The method can access any private instance field of the Math class.", "The method is called directly using the class name.", "The method's result is shared across every object instance."], "correct": 2, "hint": "Think about the 'Access Pattern' for members marked with the static keyword."}, {"question": "Look at this Car class snippet:\n\n`class Car {` \n `  private string _model;` \n `  public string GetModel() { return _model; }` \n `}`\n\nIf another class called `Dealership` tries to execute `myCar._model = \"Tesla\";`, what will happen?", "options": ["The code will compile successfully because Dealership is a client class.", "A compiler error will occur because `_model` is private.", "The value will be updated, but only temporarily.", "The program will automatically use `GetModel()` to perform the update."], "correct": 1, "hint": "Review the 'Private vs Public Access' rules for identifiers."}, {"question": "Which of the following describes a 'void' method?", "options": ["A method that contains no code in its body.", "A method that returns a null value by default.", "A method that performs an action but does not send a value back to the caller.", "A method that can only be called from within a constructor."], "correct": 2, "hint": "Focus on the distinction between value-returning methods and action-performing methods."}, {"question": "What happens on the 'call stack' when `MethodA()` calls `MethodB()`?", "options": ["C# deletes MethodA() from memory to save space for MethodB().", "C# begins MethodB() and remembers the exact spot in MethodA() to return to.", "The program executes both methods simultaneously using multiple cores.", "MethodB() inherits all the local variables of MethodA()."], "correct": 1, "hint": "Consider the 'Stack Unwinding' process explained in the material."}, {"question": "In the Agent class example from the source material, the Agent has a `private Car _car;` field. This demonstrates that:", "options": ["The Agent class is a child of the Car class.", "Agent and Car must be in the same namespace.", "One class can act as a client and utilize the functionality of another class.", "The Car object can access the Agent's private name field."], "correct": 2, "hint": "Think about how different 'modular units' connect and communicate in OOP."}, {"question": "Consider the method signature: `void Process(int x, double y, string z = \"None\")`. Which call to this method is invalid?", "options": ["`Process(10, 5.5, \"Full\");`", "`Process(10, 5.5);`", "`Process(5.5, 10);`", "`Process(5, 2);`"], "correct": 2, "hint": "Remember that arguments must match parameters in number, type, and order."}, {"question": "What is the relationship between class attributes and class methods?", "options": ["Methods are used to declare attributes.", "Methods have access to all attributes within the same class.", "Attributes and methods cannot have the same access modifiers.", "Attributes are local versions of methods."], "correct": 1, "hint": "Consider the visibility of variables declared at the top level of a class versus inside a function."}, {"question": "If a class has two constructors, one taking no arguments and one taking a `string`, this is an example of:", "options": ["Encapsulation.", "Constructor Overloading.", "Namespace collision.", "Implicit conversion."], "correct": 1, "hint": "Think of the term for having multiple methods with the same name but different signatures."}, {"question": "Which C# built-in class contains the static method `Abs()`, used for returning the absolute value of a number?", "options": ["Console", "Convert", "Math", "Program"], "correct": 2, "hint": "Identify the class responsible for numerical and algebraic utility functions."}, {"question": "In the Car class, the field `_sold` is set to `true` when the `sell()` method is called. What OOP concept does this update represent?", "options": ["Defining the public interface.", "Modifying the object's internal state.", "Static member access.", "Namespace organization."], "correct": 1, "hint": "Focus on what attributes represent for an individual object."}, {"question": "Why can't a static method like `Main()` directly access a non-static attribute variable?", "options": ["Because non-static attributes are always private.", "Because the static method exists without a specific object instance.", "Because static methods can only be called from other namespaces.", "Because non-static attributes are stored in the stack, not the heap."], "correct": 1, "hint": "Consider whether a class-level method knows about the data of a specific individual 'instance'."}, {"question": "Which of the following is NOT one of the three main components of a C# class as described in the source material?", "options": ["Attributes", "Methods", "Constructors", "Namespaces"], "correct": 3, "hint": "Look for the element that organizes multiple classes rather than defining the internal structure of one."}, {"question": "True or False: A class can have multiple constructors as long as they have different parameter lists.", "options": ["True", "False"], "correct": 0, "hint": "Consider the 'BankAccount' example where one constructor took a balance and the other did not."}, {"question": "What is the primary benefit of the 'Getters and Setters' pattern?", "options": ["It speeds up the program by avoiding method calls.", "It provides controlled access to private data, allowing for validation.", "It eliminates the need for constructors.", "It makes all class attributes public to the client."], "correct": 1, "hint": "Think about why you would want a 'set' method instead of letting a user change a variable directly."}, {"question": "Given the statement `double d = Convert.ToDouble(Console.ReadLine());`, which class is providing the utility for type conversion?", "options": ["Console", "Convert", "Double", "Math"], "correct": 1, "hint": "Look for the class name associated with the 'ToDouble' method."}, {"question": "In the Traffic System example, what would 'Traffic Lights' represent in an OOP model?", "options": ["A class with attributes like 'current color' and methods like 'changeState()'.", "A static method within the Road class.", "A namespace containing all vehicle-related objects.", "A local variable inside the Main algorithm."], "correct": 0, "hint": "Recall the 'Object-Oriented Thinking' process for system design."}, {"question": "What is the outcome of the following method call logic?\n\n`int balance = 10;` \n `bool deposit(int amount) { balance += amount; return true; }` \n `deposit(-5);`", "options": ["The balance becomes 15 because the negative sign is ignored.", "The balance becomes 5.", "The method returns false because the amount is negative.", "A runtime error occurs due to an invalid argument."], "correct": 1, "hint": "Trace the math carefully: what happens when you add a negative number to a variable?"}, {"question": "In the Car class, the field names are written as `_color` and `_model`. What does the underscore convention usually indicate in C#?", "options": ["The fields are public and can be accessed by any class.", "The fields are private members of the class.", "The fields are static and belong to the class level.", "The fields are temporary and will be deleted after the constructor runs."], "correct": 1, "hint": "Consider the 'Encapsulation' section and the provided Car class examples."}, {"question": "When a method is declared as `public int GetAge()`, what must the method body contain to be valid?", "options": ["A Console.WriteLine statement displaying the age.", "A return statement followed by an integer value.", "A call to a static Math function.", "A constructor for the Age class."], "correct": 1, "hint": "Focus on the requirement for 'Value-returning methods' mentioned in the source."}, {"question": "True or False: If you create a class but do not write any methods, you can still instantiate objects from it.", "options": ["True", "False"], "correct": 0, "hint": "Think about the minimum requirements for a class definition."}, {"question": "How does the 'new' operator interact with a class constructor?", "options": ["It deletes the constructor after it is used once.", "It allocates memory for the object and then triggers the constructor to initialize it.", "It converts the class into a namespace.", "It allows the constructor to access variables from Main()."], "correct": 1, "hint": "Recall the 'Combined Syntax' explanation for creating class objects."}, {"question": "Which of the following is a 'design principle' for creating a public interface for a class?", "options": ["Make as many fields public as possible for easy access.", "Only expose methods that a client actually needs to interact with the object.", "Ensure that the constructor is private to prevent instantiation.", "Place every class in the same default namespace."], "correct": 1, "hint": "Think about the advice given on how to protect internal data while enabling object usage."}]}, {"key": "polymorphism", "topic": "Polymorphism & Inheritance", "description": "Base/derived classes, virtual methods, casting", "quizTitle": "C# Polymorphism Quiz", "questions": [{"question": "What does the term 'Polymorphism' literally mean in the context of Object-Oriented Programming?", "options": ["Many forms", "Code reuse", "Data hiding", "Inheritance chain"], "correct": 0, "hint": "Consider the Greek roots of the prefix 'poly-' and the suffix '-morph'."}, {"question": "Which keyword is required in a base class method to allow derived classes to provide their own implementation?", "options": ["virtual", "override", "protected", "static"], "correct": 0, "hint": "This keyword indicates that the method's implementation is not necessarily fixed for its children."}, {"question": "In C#, what is the purpose of the following syntax: `public class Dog : Pet`?", "options": ["To establish that Dog inherits from Pet", "To create an instance of Pet named Dog", "To define a 'HAS A' relationship", "To implement an interface"], "correct": 0, "hint": "Think about how one class acquires the properties and behaviors of another."}, {"question": "Consider the following code snippet:\n\nclass Calculator {\n    public int Add(int a, int b) { return a + b; }\n    public double Add(double a, double b) { return a + b; }\n}\n\nWhat type of polymorphism is demonstrated here?", "options": ["Compile-time (Static) Polymorphism", "Runtime (Dynamic) Polymorphism", "Downcasting", "Constructor Chaining"], "correct": 0, "hint": "Notice that the methods have the same name but different parameters within the same class."}, {"question": "Which access modifier allows a member to be accessed within its own class and by all derived classes, but not by external code?", "options": ["protected", "private", "public", "internal"], "correct": 0, "hint": "This modifier is the 'key' for sharing attributes with 'children' while hiding them from 'strangers'."}, {"question": "What is the correct order of constructor execution when a derived class object is instantiated?", "options": ["Base class constructor first, then derived class constructor", "Derived class constructor first, then base class constructor", "They execute simultaneously", "Only the derived class constructor executes"], "correct": 0, "hint": "Consider why a child class might need its parent's data to be ready before it starts its own setup."}, {"question": "In C#, how do you explicitly call a specific base class constructor from a derived class constructor?", "options": ["Using the `: base()` syntax after the derived constructor signature", "Using `parent.Constructor()` inside the code block", "By declaring the base constructor as `virtual`", "Using the `super()` keyword"], "correct": 0, "hint": "This syntax involves a keyword followed by parentheses and appears before the opening brace of the constructor."}, {"question": "Which of the following describes 'Upcasting'?", "options": ["Converting a derived class reference to a base class type", "Converting a base class reference to a derived class type", "Converting between two unrelated classes like Car and Agent", "Overloading a method with different return types"], "correct": 0, "hint": "Think of moving 'upwards' towards the more general/parent type in an inheritance tree."}, {"question": "Consider this code:\n\nPet myPet = new Dog(\"Labrador\", 3.5);\nmyPet.HideBone();\n\nAssuming `HideBone()` is defined *only* in the `Dog` class and `Pet` is the base class, what will happen?", "options": ["A compilation error will occur", "The code will run successfully because the actual object is a Dog", "A runtime InvalidCastException will be thrown", "The Dog implementation of HideBone will be called via polymorphism"], "correct": 0, "hint": "The compiler looks at the 'label' on the reference variable to see what methods it can find."}, {"question": "What is the primary risk associated with 'Downcasting'?", "options": ["It can throw a runtime InvalidCastException", "It consumes significant amounts of extra memory", "It prevents the use of virtual methods", "It is not supported in the C# language"], "correct": 0, "hint": "Think about what happens if you try to treat a Pet that is actually a Fish as if it were a Dog."}, {"question": "How does the `as` operator behave during a type conversion compared to a standard explicit cast?", "options": ["It returns null instead of throwing an exception if the cast fails", "It automatically converts the object to a string", "It creates a new copy of the object in the new type", "It can only // per-quiz state, keyed by quiz index, persists while the page stays open
const quizState = quizzes.map(q => ({
  current: 0,
  answers: q.questions.map(() => ({ selected: null, checked: false }))
}));

let activeQuizIndex = null;

const menuScreen = document.getElementById('menuScreen');
const quizScreen = document.getElementById('quizScreen');
const topicGrid = document.getElementById('topicGrid');
const homeBtn = document.getElementById('homeBtn');
const quizHeading = document.getElementById('quizHeading');

const questionText = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const feedback = document.getElementById('feedback');
const feedbackTitle = document.getElementById('feedbackTitle');
const feedbackHint = document.getElementById('feedbackHint');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const checkBtn = document.getElementById('checkBtn');
const progressLabel = document.getElementById('progressLabel');
const answeredLabel = document.getElementById('answeredLabel');
const progressFill = document.getElementById('progressFill');
const scoreLabel = document.getElementById('scoreLabel');

function renderMenu() {
  topicGrid.innerHTML = '';
  quizzes.forEach((q, i) => {
    const state = quizState[i];
    const answeredCount = state.answers.filter(a => a.checked).length;
    const btn = document.createElement('button');
    btn.className = 'topic-card';
    btn.innerHTML = `
      <div class="topic-title">${i + 1}. ${q.topic}</div>
      <div class="topic-desc">${q.description}</div>
      <div class="topic-meta">${q.questions.length} questions${answeredCount ? ' — ' + answeredCount + '/' + q.questions.length + ' answered' : ''}</div>
    `;
    btn.addEventListener('click', () => openQuiz(i));
    topicGrid.appendChild(btn);
  });
}

function openQuiz(index) {
  activeQuizIndex = index;
  menuScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  quizHeading.textContent = quizzes[index].quizTitle;
  renderQuestion();
}

function goHome() {
  activeQuizIndex = null;
  quizScreen.classList.add('hidden');
  menuScreen.classList.remove('hidden');
  renderMenu();
}

function renderQuestion() {
  const quiz = quizzes[activeQuizIndex];
  const state = quizState[activeQuizIndex];
  const q = quiz.questions[state.current];
  const s = state.answers[state.current];

  questionText.textContent = q.question;
  progressLabel.textContent = `Question ${state.current + 1} of ${quiz.questions.length}`;

  const answeredCount = state.answers.filter(x => x.checked).length;
  answeredLabel.textContent = `${answeredCount} answered`;
  progressFill.style.width = `${((state.current + 1) / quiz.questions.length) * 100}%`;

  optionsContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    if (s.checked) div.classList.add('locked');
    if (s.selected === i && !s.checked) div.classList.add('selected');
    if (s.checked) {
      if (i === q.correct) div.classList.add('correct');
      else if (i === s.selected) div.classList.add('incorrect');
    }

    const input = document.createElement('input');
    input.type = 'radio';
    input.name = 'option';
    input.checked = s.selected === i;
    input.disabled = s.checked;

    const label = document.createElement('span');
    label.textContent = opt;

    div.appendChild(input);
    div.appendChild(label);

    if (!s.checked) {
      div.addEventListener('click', () => {
        s.selected = i;
        renderQuestion();
      });
    }

    optionsContainer.appendChild(div);
  });

  if (s.checked) {
    const isCorrect = s.selected === q.correct;
    feedback.classList.add('show');
    feedback.classList.toggle('correct', isCorrect);
    feedback.classList.toggle('incorrect', !isCorrect);
    feedbackTitle.textContent = isCorrect ? '✅ Correct!' : `❌ Incorrect — correct answer: "${q.options[q.correct]}"`;
    feedbackHint.textContent = q.hint;
  } else {
    feedback.classList.remove('show', 'correct', 'incorrect');
  }

  checkBtn.disabled = s.selected === null || s.checked;
  checkBtn.textContent = s.checked ? 'Answer Checked' : 'Check Answer';
  prevBtn.disabled = state.current === 0;
  nextBtn.disabled = state.current === quiz.questions.length - 1;

  if (answeredCount === quiz.questions.length) {
    const correctCount = state.answers.filter((x, i) => x.selected === quiz.questions[i].correct).length;
    scoreLabel.textContent = `Score: ${correctCount} / ${quiz.questions.length}`;
  } else {
    scoreLabel.textContent = '';
  }
}

checkBtn.addEventListener('click', () => {
  const state = quizState[activeQuizIndex];
  const s = state.answers[state.current];
  if (s.selected === null || s.checked) return;
  s.checked = true;
  renderQuestion();
});

prevBtn.addEventListener('click', () => {
  const state = quizState[activeQuizIndex];
  if (state.current > 0) {
    state.current--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  const state = quizState[activeQuizIndex];
  const quiz = quizzes[activeQuizIndex];
  if (state.current < quiz.questions.length - 1) {
    state.current++;
    renderQuestion();
  }
});

homeBtn.addEventListener('click', goHome);

renderMenu();
</script>
